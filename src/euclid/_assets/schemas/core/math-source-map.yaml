version: 1
map_id: canonical_math_source_map
phase: canonical_readiness_02
description: >-
  Pre-rewrite merge map for Euclid's canonical math layer. Each entry records
  the strongest current precursor for a canonical math object and whether the
  current formulation can be promoted directly, must be synthesized across
  multiple sources, or exists only as retained-boundary language that later
  phases must replace with positive canon or an exact non-admission law.
decision_vocab:
  - id: promote_directly
    meaning: >-
      The current formulation is already affirmative, closed enough to carry
      forward, and only needs editorial normalization in the canonical layer.
  - id: synthesize
    meaning: >-
      The canonical object needs merged content from multiple sources or a scope
      generalization that no single precursor closes on its own.
  - id: replace_boundary_only
    meaning: >-
      The current source contributes only deferment, prohibition, or reentry
      scaffolding; later phases must replace it with positive semantics or an
      explicit Euclid-wide non-admission law.
document_posture_vocab:
  - id: affirmative_core
    meaning: Primary affirmative mathematical law written mostly in prose math.
  - id: contract_core
    meaning: Primary affirmative manifest or policy contract.
  - id: mixed_contract_with_boundary
    meaning: >-
      Contains real positive contracts, but the surrounding framing still leans
      on retained-scope or deferred-surface language.
  - id: boundary_only
    meaning: Deferred-domain or blocked-request surface with no positive math.
source_documents:
  - path: docs/reference/search-core.md
    posture: affirmative_core
    strongest_for:
      - admitted_data_object
      - target_transform_and_quantization_law
      - observation_model_contract
      - total_codelength_law
      - reducer_state_semantics
      - reference_description_and_descriptive_gain
      - descriptive_comparability_and_descriptive_abstention
      - point_forecast_object_and_point_scoring_law
    notes: >-
      Strongest affirmative precursor for the base Euclid data and coding law,
      but still retained-scope and point-only.
  - path: docs/reference/modeling-pipeline.md
    posture: affirmative_core
    strongest_for:
      - point_forecast_object_and_point_scoring_law
      - probabilistic_forecast_object_family
      - forecast_object_specific_calibration_law
    notes: >-
      Strong on type-matched point evaluation; only negative on probabilistic
      forecast objects and calibration.
  - path: docs/reference/search-core.md
    posture: boundary_only
    strongest_for:
      - full_composition_surface
      - shared_plus_local_math_and_evaluation_law
    notes: >-
      Boundary-only placeholder for shared-plus-local language. No active
      pooling, exchangeability, coding, or multi-entity evaluation law exists
      here yet.
  - path: docs/reference/modeling-pipeline.md
    posture: boundary_only
    strongest_for:
      - mechanistic_evidence_and_lane_law
    notes: >-
      Boundary-only placeholder for mechanistic language. It blocks
      mechanistic claims but does not define positive mechanistic semantics.
  - path: docs/reference/modeling-pipeline.md
    posture: affirmative_core
    strongest_for:
      - null_protocol_and_null_usage_law
      - perturbation_stability_and_leakage_law
    notes: >-
      Strongest affirmative precursor for nulls, perturbations, retention
      metrics, leakage canaries, and conservative robustness aggregation.
  - path: docs/reference/search-core.md
    posture: mixed_contract_with_boundary
    strongest_for:
      - full_reducer_family_surface
      - algorithmic_search_stage_classes_and_frontier_semantics
      - canonicalization_and_observational_equivalence
    notes: >-
      Strong on honest search-stage classes and frontier semantics, but it
      still frames algorithmic publication through retained-scope deferral.
  - path: docs/reference/modeling-pipeline.md
    posture: affirmative_core
    strongest_for:
      - claim_ladder_and_output_semantics
      - predictive_comparison_object_and_stage_protocol
      - confirmatory_test_selection_multiplicity_and_promotion
    notes: >-
      Strongest affirmative precursor for predictive governance, multiplicity,
