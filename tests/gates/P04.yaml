fixture_unit:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12
    -m pytest -q tests/unit/search tests/unit/expr tests/unit/fit tests/unit/testing
fixture_integration:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12
    -m pytest -q tests/integration
fixture_regression:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12
    -m pytest -q tests/regression tests/golden tests/spec_compiler
live_api:
  commands:
  - EUCLID_LIVE_API_TESTS=1 EUCLID_LIVE_API_STRICT=1 /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3
    -m pytest -q tests/live/test_search_portfolio_live.py
  required_env:
  - FMP_API_KEY
  - OPENAI_API_KEY
redaction:
  assertions:
  - no_secret_in_stdout
  - no_secret_in_stderr
  - no_secret_in_artifact
  - no_raw_target_values_in_replay_metadata
  - engine_trace_contains_no_credentials
replay:
  assertions:
  - replay_metadata_complete
  - replay_identity_stable
  - deterministic_engine_order
  - candidate_canonical_ids_replay_stable
claim_scope:
  assertions:
  - search_engine_not_claim_authority
  - external_engines_cannot_publish_claims_directly
  - native_legacy_adapter_is_non_claim_structure_proposal
  - orchestration_returns_candidates_not_publication_records
edge_cases:
  required:
  - engine_crash
  - engine_timeout
  - partial_result
  - malformed_engine_result
  - duplicate_canonical_output
  - failed_lowering
  - empty_declared_search_space
  - missing_values
  - nonfinite_values
  - duplicate_timestamps
  - out_of_order_timestamps
  - replay_reproduction
artifact_outputs:
- build/reports/p04-gate-evidence.json
- build/reports/completion-report.json
known_external_provider_volatility:
- Live provider values are schema/freshness checked, not exact-value checked.
- Provider success cannot close scientific claim gates without fixture, replay, and claim-scope
  evidence.
id_gates_schema:
- status
- implementation_files
- test_files
- gate_refs
- evidence_refs
- edge_cases
- redaction_assertions
- replay_assertions
- claim_scope_assertions
