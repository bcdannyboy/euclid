version: 1
kind: canonical_fixture_coverage_matrix
coverage_plan_id: euclid_canonical_fixture_coverage@1.0.0
decision_date: '2026-04-12'
fixture_root: fixtures/canonical
scope_statement: Plan the full canonical Euclid fixture corpus as a closed object
  graph that covers every major publication lane, forecast-object family, extension
  surface, and validator-rejected failure mode without relying on implied upstream
  instances.
source_inventory:
  fixture_walkthroughs:
  - path: docs/reference/examples/fixture-walkthroughs.md
    reason: Family-level reading guide for the fixture corpus.
  canonical_math:
  - path: docs/reference/modeling-pipeline.md
    reason: Lane, forecast-object, and abstention composition rules.
  - path: docs/reference/modeling-pipeline.md
    reason: Predictive gate laws, confirmatory regimes, and shared-plus-local evaluation
      rules.
  - path: docs/reference/modeling-pipeline.md
    reason: Mechanistic evidence requirements and downgrade effects.
  - path: docs/reference/search-core.md
    reason: Shared-plus-local object law and non-admission conditions.
  canonical_architecture:
  - path: docs/reference/contracts-manifests.md
    reason: Runtime contract families, ownership groups, and publication bundle surfaces.
  - path: docs/reference/search-core.md
    reason: Stage-by-stage artifact flow and failure boundaries.
global_invariants:
- scenario manifests must materialize every typed ref as an object in the same bundle
  or in a declared shared bundle shipped with the corpus
- duplicate object_id values across the canonical fixture corpus are forbidden unless
  the object is intentionally shared and declared exactly once
- every accepted publication scenario must align run_result.result_mode, publication_record.publication_mode,
  and the publication lifecycle terminal state
- every rejected or blocked scenario must encode the stopping condition as a typed
  validator or lifecycle outcome rather than a prose-only note
- walkthrough markdown may explain scenarios but may not introduce ids, enums, or
  refs missing from the machine-readable fixture bundle
scenarios:
