          - point_score_result_manifest@1.0.0
          - probabilistic_score_result_manifest@1.0.0
          - calibration_result_manifest@1.0.0
      - path: overlap_refs[]
        required: false
        cardinality: zero_or_more
        allowed_schema_names:
          - prediction_artifact_manifest@1.1.0
          - point_score_result_manifest@1.0.0
          - probabilistic_score_result_manifest@1.0.0
          - calibration_result_manifest@1.0.0

  - schema_name: mechanistic_evidence_dossier_manifest@1.0.0
    owner_ref: mechanistic_evidence_owner
    fields:
