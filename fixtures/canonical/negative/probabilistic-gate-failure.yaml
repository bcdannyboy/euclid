        object_id: probabilistic_gate_failure_reproducibility_bundle
  - state: replay_verified
    produced_artifact_refs:
      - schema_name: reproducibility_bundle_manifest@1.0.0
        object_id: probabilistic_gate_failure_reproducibility_bundle
  - state: candidate_publication_selected
    produced_artifact_refs:
      - schema_name: run_result_manifest@1.1.0
        object_id: probabilistic_gate_failure_run_result
  - state: publication_record_written
    produced_artifact_refs:
      - schema_name: publication_record_manifest@1.1.0
        object_id: probabilistic_gate_failure_publication_record
  - state: publication_completed
