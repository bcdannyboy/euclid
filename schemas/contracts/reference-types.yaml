version: 1
kind: reference_type_registry
owners:
  - id: reference_type_registry_council
    display_name: Reference Type Registry Council
typed_ref_shape:
  required_fields:
    - schema_name
    - object_id
  forbidden_placeholders:
    - free_string_ref
    - prose_only_selector
    - schema_less_object_id
  optional_ref_rule: omit_field_when_absent
reference_profiles:
  - schema_name: observation_model_manifest@1.1.0
    owner_ref: candidate_fitting_owner
    fields:
      - path: target_transform_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - target_transform_manifest@1.0.0
      - path: base_measure_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - base_measure_policy_manifest@1.0.0

  - schema_name: codelength_policy_manifest@1.1.0
    owner_ref: candidate_fitting_owner
    fields:
      - path: target_transform_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - target_transform_manifest@1.0.0
      - path: base_measure_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - base_measure_policy_manifest@1.0.0
      - path: reference_description_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reference_description_policy_manifest@1.1.0

  - schema_name: null_protocol_manifest@1.1.0
    owner_ref: robustness_owner
    fields:
      - path: surrogate_generator_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - surrogate_generator_manifest@1.0.0

  - schema_name: perturbation_protocol_manifest@1.1.0
    owner_ref: robustness_owner
    fields:
      - path: base_codelength_policy_ref
        required: false
        required_when: perturbations[].family_id contains quantization_coarsening
        cardinality: zero_or_one
        allowed_schema_names:
          - codelength_policy_manifest@1.1.0
      - path: baseline_registry_ref
        required: false
        required_when: required_metric_refs contains outer_baseline_win_rate
        cardinality: zero_or_one
        allowed_schema_names:
          - baseline_registry_manifest@1.1.0
      - path: point_score_policy_ref
        required: false
        required_when: required_metric_refs contains outer_baseline_win_rate
        cardinality: zero_or_one
        allowed_schema_names:
          - point_score_policy_manifest@1.0.0
          - probabilistic_score_policy_manifest@1.0.0
          - interval_score_policy_manifest@1.0.0
          - quantile_score_policy_manifest@1.0.0
          - event_probability_score_policy_manifest@1.0.0
      - path: required_metric_refs[]
        required: true
        cardinality: one_or_more
        unique_items: true
        allowed_schema_names:
          - retention_metric_manifest@1.0.0
      - path: metric_thresholds[].metric_ref
        required: true
        cardinality: one_or_more
        allowed_schema_names:
          - retention_metric_manifest@1.0.0

  - schema_name: search_plan_manifest@1.0.0
    owner_ref: search_planning_owner
    fields:
      - path: canonicalization_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - canonicalization_policy_manifest@1.0.0
      - path: codelength_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - codelength_policy_manifest@1.1.0
      - path: reference_description_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reference_description_policy_manifest@1.1.0
      - path: observation_model_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - observation_model_manifest@1.1.0

  - schema_name: shared_plus_local_decomposition_policy_manifest@1.0.0
    owner_ref: shared_plus_local_decomposition_owner
    fields:
      - path: typed_pooling_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - typed_pooling_manifest@1.0.0
      - path: conditional_shared_local_codelength_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - conditional_shared_local_codelength_contract@1.0.0
      - path: exchangeability_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - exchangeability_manifest@1.0.0
      - path: unseen_entity_prediction_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - unseen_entity_prediction_policy_manifest@1.0.0
      - path: multi_entity_predictive_evaluation_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - multi_entity_predictive_evaluation_manifest@1.0.0
      - path: shared_local_freeze_refit_protocol_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - shared_local_freeze_refit_protocol_manifest@1.0.0

  - schema_name: mechanistic_lane_policy_manifest@1.0.0
    owner_ref: mechanistic_evidence_owner
    fields:
      - path: mechanism_mapping_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - domain_specific_mechanism_mapping_manifest@1.0.0
      - path: units_check_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - units_check_manifest@1.0.0
      - path: invariance_test_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - invariance_test_manifest@1.0.0
      - path: external_evidence_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - external_evidence_manifest@1.0.0
      - path: evidence_independence_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - evidence_independence_protocol_manifest@1.0.0

  - schema_name: freeze_event_manifest@1.0.0
    owner_ref: search_planning_owner
    fields:
      - path: frozen_candidate_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reducer_artifact_manifest@1.0.0
      - path: frozen_shortlist_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - frozen_shortlist_manifest@1.0.0

  - schema_name: frozen_shortlist_manifest@1.0.0
    owner_ref: search_planning_owner
    fields:
      - path: search_plan_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - search_plan_manifest@1.0.0
      - path: candidate_refs[]
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reducer_artifact_manifest@1.0.0

  - schema_name: baseline_registry_manifest@1.1.0
    owner_ref: evaluation_governance_owner
    fields:
      - path: compatible_point_score_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - point_score_policy_manifest@1.0.0
          - probabilistic_score_policy_manifest@1.0.0
          - interval_score_policy_manifest@1.0.0
          - quantile_score_policy_manifest@1.0.0
          - event_probability_score_policy_manifest@1.0.0

  - schema_name: forecast_comparison_policy_manifest@1.1.0
    owner_ref: evaluation_governance_owner
    fields:
      - path: primary_score_policy_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - point_score_policy_manifest@1.0.0
          - probabilistic_score_policy_manifest@1.0.0
          - interval_score_policy_manifest@1.0.0
          - quantile_score_policy_manifest@1.0.0
          - event_probability_score_policy_manifest@1.0.0

  - schema_name: evaluation_event_log_manifest@1.0.0
    owner_ref: evaluation_governance_owner
    fields:
      - path: events[].related_object_ref
        required: true
        cardinality: one_per_event
        discriminator_field: ref_kind
        allowed_schema_names_by_discriminator:
          search_plan:
            - search_plan_manifest@1.0.0
          comparison_universe:
            - comparison_universe_manifest@1.0.0
          freeze_event:
            - freeze_event_manifest@1.0.0
          frozen_shortlist:
            - frozen_shortlist_manifest@1.0.0
          prediction_artifact:
            - prediction_artifact_manifest@1.1.0
          run_result:
            - run_result_manifest@1.1.0

  - schema_name: evaluation_governance_manifest@1.1.0
    owner_ref: evaluation_governance_owner
    fields:
      - path: comparison_universe_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - comparison_universe_manifest@1.0.0
      - path: event_log_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - evaluation_event_log_manifest@1.0.0
      - path: freeze_event_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - freeze_event_manifest@1.0.0
      - path: frozen_shortlist_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - frozen_shortlist_manifest@1.0.0

  - schema_name: external_evidence_record_manifest@1.0.0
    owner_ref: external_evidence_ingestion_owner
    fields:
      - path: source_digest_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - source_digest_manifest@1.0.0

  - schema_name: external_evidence_manifest@1.0.0
    owner_ref: external_evidence_ingestion_owner
    fields:
      - path: record_refs[]
        required: true
        cardinality: one_or_more
        allowed_schema_names:
          - external_evidence_record_manifest@1.0.0
      - path: source_digest_refs[]
        required: true
        cardinality: one_or_more
        allowed_schema_names:
          - source_digest_manifest@1.0.0

  - schema_name: domain_specific_mechanism_mapping_manifest@1.0.0
    owner_ref: mechanistic_evidence_owner
    fields:
      - path: candidate_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reducer_artifact_manifest@1.0.0
      - path: prediction_artifact_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - prediction_artifact_manifest@1.1.0
      - path: external_evidence_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - external_evidence_manifest@1.0.0

  - schema_name: units_check_manifest@1.0.0
    owner_ref: mechanistic_evidence_owner
    fields:
