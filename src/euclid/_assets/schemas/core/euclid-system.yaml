scope_statement: >-
  Euclid is a mathematical forecasting system for ordered observations. It
  freezes time-safe datasets, searches bounded model spaces, scores point and
  probabilistic forecasts under explicit comparison geometry, attaches replay,
  robustness, and evidence constraints, and publishes cautious claims or
  abstentions instead of narrative-only conclusions.
