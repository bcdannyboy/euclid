    -m pytest -q tests/regression/test_live_api_evidence_redaction.py tests/benchmarks/test_full_vision_suite.py
live_api:
  commands:
  - EUCLID_LIVE_API_TESTS=1 EUCLID_LIVE_API_STRICT=1 ./scripts/live_api_smoke.sh
  - EUCLID_LIVE_API_TESTS=1 EUCLID_LIVE_API_STRICT=1 /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3
    -m pytest -q tests/live/test_fmp_live_ingestion_smoke.py tests/live/test_openai_live_explainer_smoke.py
  required_env:
  - FMP_API_KEY
  - OPENAI_API_KEY
redaction:
  assertions: &id002
  - no_secret_in_stdout
  - no_secret_in_stderr
  - no_secret_in_artifact
  - no_secret_in_url
  - no_secret_in_header
  - no_secret_in_exception
  - no_secret_in_release_bundle
replay:
  assertions: &id003
  - replay_metadata_complete
  - replay_verified_artifact_ids_recorded
  - replay_environment_ids_recorded
  - replay_hash_mismatch_fails_readiness
claim_scope:
  assertions: &id004
  - no_unjustified_claim_promotion
  - live_api_success_is_not_scientific_truth
  - benchmark_file_existence_alone_cannot_pass
edge_cases:
  required: &id001
  - missing_env_file
  - blank_env_value
  - process_env_override
  - invalid_boolean_flag
  - missing_key_strict_mode
  - disabled_live_tests
  - provider_http_401
  - provider_http_429
  - provider_http_500
  - provider_timeout
  - malformed_provider_payload
  - empty_history
  - duplicate_dates
  - out_of_order_rows
  - fake_secret_in_url
  - fake_secret_in_header
  - fake_secret_in_exception
  - replay_hash_mismatch
artifact_outputs:
- build/reports/completion-report.json
- build/reports/verify-completion.json
- live-api-evidence.json
known_external_provider_volatility:
- FMP prices and volumes are shape-checked, not exact-value checked.
- OpenAI prose is schema-checked, not exact-text checked.
