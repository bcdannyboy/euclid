fixture_unit:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12 -m pytest -q tests/unit/fit tests/unit/expr tests/unit/search tests/unit/testing
fixture_integration:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12 -m pytest -q tests/integration
fixture_regression:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12 -m pytest -q tests/regression
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3.12 -m pytest -q tests/golden
live_api:
  commands:
  - EUCLID_LIVE_API_TESTS=1 EUCLID_LIVE_API_STRICT=1 /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3 -m pytest -q tests/live/test_constant_fitting_live.py
  required_env:
  - FMP_API_KEY
  - OPENAI_API_KEY
redaction:
  assertions:
  - fit_evidence_excludes_raw_rows
  - fit_evidence_excludes_train_target_values
  - no_secret_in_stdout
  - no_secret_in_stderr
  - no_secret_in_artifact
  - no_secret_in_url
  - no_secret_in_header
replay:
  assertions:
  - fit_replay_identity_stable
  - optimizer_replay_metadata_complete
  - optimizer_library_versions_recorded
  - replay_mismatch_fails_closed
claim_scope:
  assertions:
  - fit_is_not_claim_authority
  - search_proposes_structures_only
  - unified_fit_required_before_candidate_fit_artifacts
  - live_api_success_is_not_scientific_truth
edge_cases:
  required:
  - singular_underdetermined_fitting
  - optimizer_non_convergence
  - invalid_domains
  - missing_values
  - nonfinite_values
  - leakage_prevention
  - train_only_overfit_candidates
  - duplicate_timestamps
  - out_of_order_timestamps
  - replay_determinism
  - redacted_evidence
  - invalid_credentials
  - rate_limit
  - timeout
  - malformed_payload
  - empty_payload
artifact_outputs:
- build/reports/p03-gate-evidence.json
- schemas/contracts/optimizer-diagnostics.yaml
known_external_provider_volatility:
- Live provider values are schema/freshness checked, not exact-value checked.
- Provider success cannot close scientific claim gates without fixture, replay, and claim-scope evidence.
id_gates_schema:
- status
- implementation_files
- test_files
- gate_refs
- evidence_refs
- edge_cases
- redaction_assertions
- replay_assertions
- claim_scope_assertions
