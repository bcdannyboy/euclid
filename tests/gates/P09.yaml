    -m pytest -q tests/integration/test_shared_structure_law_pipeline.py
fixture_regression:
  commands:
  - /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3
    -m pytest -q tests/golden tests/regression
live_api:
  commands:
  - EUCLID_LIVE_API_TESTS=1 EUCLID_LIVE_API_STRICT=1 /Users/danielbloom/.cache/codex-runtimes/codex-primary-runtime/dependencies/python/bin/python3
    -m pytest -q tests/live/test_shared_structure_panel_live.py
  required_env:
  - FMP_API_KEY
  - OPENAI_API_KEY
redaction:
  assertions: &id002
  - no_secret_in_stdout
  - no_secret_in_stderr
  - no_secret_in_artifact
  - no_secret_in_url
  - no_secret_in_header
replay:
  assertions: &id003
  - replay_metadata_complete
  - replay_identity_stable
  - replay_mismatch_fails_closed
claim_scope:
  assertions: &id004
  - no_unjustified_claim_promotion
  - phase_incomplete_blocks_exit
  - live_api_success_is_not_scientific_truth
edge_cases:
  required: &id001
  - empty_input
  - single_row_input
  - missing_values
  - nonfinite_values
  - duplicate_timestamps
  - out_of_order_timestamps
  - invalid_credentials
  - rate_limit
  - timeout
  - malformed_payload
  - empty_payload
  - replay_mismatch
artifact_outputs:
- build/reports/p09-gate-evidence.json
known_external_provider_volatility:
- Live provider values are schema/freshness checked, not exact-value checked.
- Provider success cannot close scientific claim gates without fixture, replay, and
  claim-scope evidence.
