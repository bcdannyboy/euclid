version: 1
kind: claim_lane_semantics
meaning_axis: claim_lane
owners:
- id: claim_lane_semantics_council
  display_name: Claim Lane Semantics Council
global_rules:
  scoped_prediction_is_not_universal_law: true
  predictive_nonpromotion_after_descriptive_success: downgrade_to_descriptive_structure_without_abstention
  descriptive_publication_failure_mode: typed_abstention_only
  invariant_language_requires_invariance_evaluation: true
  transport_language_requires_out_of_environment_evidence: true
  mean_offset_panel_baseline_is_never_law_evidence: true
  probabilistic_meaning_axis: forecast_object_type
  mechanistic_meaning_axis: claim_lane_with_external_evidence
legacy_aliases:
- legacy_claim_lane: descriptive_only
  production_claim_lane: descriptive_structure
  production_status: legacy_non_claim_alias
- legacy_claim_lane: predictively_supported
  production_claim_lane: predictive_within_declared_scope
  production_status: legacy_non_claim_alias
- legacy_claim_lane: mechanistically_compatible_hypothesis
  production_claim_lane: mechanistically_compatible_law
  production_status: legacy_non_claim_alias
contracts:
- claim_lane: descriptive_structure
  owner_ref: claim_lane_semantics_council
  meaning: Descriptive publication-safe summary of observed structure under the bound
    coding law.
  required_evidence_classes:
  - descriptive_compression
  - robustness
  - replay_verification
  - readiness_and_closure
  allowed_to_say:
  - historical_structure_summary
  forbidden_without_upgrade:
  - point_forecast_within_declared_validation_scope
  - probabilistic_forecast_claim
  - calibration_claim
  - mechanism_claim
  - invariant_claim
  - universal_claim
  - causal_claim
  - transport_claim
  may_publish:
  - reducer_artifact
  - prediction_artifact
  - scorecard
  - claim_card
  - reproducibility_bundle
  - run_result
  - publication_record
  abstention_interaction: typed_abstention_only_when_descriptive_publication_fails
- claim_lane: predictive_within_declared_scope
  owner_ref: claim_lane_semantics_council
  meaning: Predictive publication-safe result that survives the bound out-of-sample
    protocol and baseline comparison only for the declared scope.
  required_evidence_classes:
  - descriptive_compression
  - predictive_generalization
  - robustness
  - replay_verification
  - readiness_and_closure
  allowed_to_say:
  - historical_structure_summary
  - point_forecast_within_declared_validation_scope
  forbidden_without_upgrade:
  - mechanism_claim
  - invariant_claim
  - universal_claim
  - causal_claim
  - transport_claim
  may_publish:
  - reducer_artifact
  - prediction_artifact
  - scorecard
  - claim_card
  - reproducibility_bundle
  - run_result
  - publication_record
  abstention_interaction: downgrade_to_descriptive_structure_when_predictive_support_fails
- claim_lane: mechanistically_compatible_law
  owner_ref: claim_lane_semantics_council
  meaning: Mechanistic compatibility statement carried only when predictive support
    and external mechanism evidence contracts are both satisfied.
  requires_lower_lane_support: predictive_within_declared_scope
  required_evidence_classes:
  - descriptive_compression
  - predictive_generalization
  - robustness
  - replay_verification
  - readiness_and_closure
  - boundary_specific_external_evidence
  allowed_to_say:
  - historical_structure_summary
  - point_forecast_within_declared_validation_scope
  - mechanism_claim
  forbidden_without_upgrade:
  - invariant_claim
  - universal_claim
  - causal_proof
  - transport_claim
  may_publish:
  - reducer_artifact
  - prediction_artifact
  - scorecard
  - claim_card
  - reproducibility_bundle
  - run_result
  - publication_record
  publication_status: requires_bound_external_evidence_contracts
  abstention_interaction: downgrade_to_predictive_within_declared_scope_or_block_when_external_evidence_contracts_fail
