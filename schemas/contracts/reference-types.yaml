        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - reducer_artifact_manifest@1.0.0
      - path: prediction_artifact_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - prediction_artifact_manifest@1.1.0
      - path: external_evidence_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - external_evidence_manifest@1.0.0
      - path: mechanism_mapping_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - domain_specific_mechanism_mapping_manifest@1.0.0
      - path: units_check_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - units_check_manifest@1.0.0
      - path: invariance_test_ref
        required: true
        cardinality: exactly_one
        allowed_schema_names:
          - invariance_test_manifest@1.0.0
      - path: evidence_independence_ref
        required: true
