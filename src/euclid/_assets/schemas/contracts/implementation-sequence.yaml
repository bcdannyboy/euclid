version: 1
kind: implementation_sequence
sequence_id: euclid_python_implementation_sequence@1.0.0
source_module_registry: schemas/contracts/module-registry.yaml
ordering_rule: dependency_topology_then_layer_order
implementation_layers:
  - layer_id: registration_and_intake
    title: Registration and intake
    modules:
      - manifest_registry
      - external_evidence_ingestion
      - ingestion
  - layer_id: freeze_and_planning
    title: Freeze and planning
    modules:
      - snapshotting
      - timeguard
      - features
      - split_planning
      - search_planning
      - evaluation_governance
  - layer_id: candidate_realization
    title: Candidate realization
    modules:
      - algorithmic_dsl
      - shared_plus_local_decomposition
      - candidate_fitting
  - layer_id: evidence_production
    title: Evidence production
    modules:
      - evaluation
      - probabilistic_evaluation
      - scoring
      - robustness
      - mechanistic_evidence
  - layer_id: meaning_replay_and_publication
    title: Meaning, replay, and publication
    modules:
      - gate_lifecycle
      - claims
      - replay
      - catalog_publishing
evidence_policy:
  modules_without_direct_math_refs_use_architecture_and_contract_refs: true
  schema_names_must_match_schema_registry: true
  fixture_refs_must_be_listed_in_fixture_coverage: true
  test_refs_must_point_to_live_regression_files: true
module_sequence:
