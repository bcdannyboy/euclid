version: 1
kind: full_vision_matrix
scope_authority_refs:
- docs/reference/system.md
- docs/reference/system.md
benchmark_governed_outcome_vocabulary:
  abstention_modes:
  - calibrated_or_abstain
  - honest_abstention
  - no_publishable_winner
  - structural_miss
  insufficiency_reason_codes:
  - external_evidence_insufficient
  - mechanistic_evidence_insufficient
  - robustness_floor_failed
  - codelength_comparability_failed
  rules:
  - Benchmark-governed rows must distinguish typed abstention modes from non-closing insufficiency reasons.
  - A benchmark task may prove semantic behavior only for a row whose runtime surface is explicitly represented in this matrix.
