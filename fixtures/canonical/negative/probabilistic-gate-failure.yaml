  - split_planning
  - evaluation_governance
  - timeguard
  - candidate_fitting
  - evaluation
  - probabilistic_evaluation
  - scoring
  - robustness
  - gate_lifecycle
  - claims
  - replay
  - catalog_publishing
required_schema_families:
  - validation_scope_manifest@1.0.0
